<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascension Wharf — Connect Snapchat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0C2818;font-family:Arial,sans-serif;color:#D4AF6A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.card{background:#0F3520;border:1px solid #1A5030;border-radius:12px;padding:40px;max-width:480px;width:100%;text-align:center;}
.logo{font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:#5A8A6A;margin-bottom:28px;}
h1{font-size:26px;font-weight:300;margin-bottom:8px;}
p{font-size:14px;color:#7AAA8A;line-height:1.7;margin-bottom:28px;}
.divider{height:1px;background:#1A5030;margin:22px 0;}
.section-title{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:#5A8A6A;margin-bottom:14px;}
.snap-login-btn{display:flex;align-items:center;gap:12px;background:#FFFC00;color:#000;border:none;border-radius:50px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%;justify-content:center;margin-bottom:12px;transition:opacity 0.2s;}
.snap-login-btn:hover{opacity:0.88;}
.snap-share-btn{display:flex;align-items:center;gap:12px;background:transparent;color:#FFFC00;border:2px solid #FFFC00;border-radius:50px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:all 0.2s;}
.snap-share-btn:hover{background:#FFFC00;color:#000;}
.status{background:#0A2515;border:1px solid #1A5030;border-radius:8px;padding:16px;margin-top:18px;display:none;text-align:left;}
.status.show{display:block;}
.status p{font-size:12.5px;color:#5ACA7A;margin:0;line-height:1.8;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Ascension Wharf — Social Media Management</div>
  <h1>Connect Your Snapchat</h1>
  <p>Authorise Ascension Wharf to schedule and publish content to your Snapchat Stories and Spotlight on your behalf using Login Kit and Creative Kit.</p>

  <div class="section-title">Step 1 — Authenticate with Login Kit</div>
  <button class="snap-login-btn" onclick="doLogin()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#000000">
      <path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738.12.146.174.317.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12.017 24c6.623 0 11.99-5.367 11.99-11.987C24.007 5.367 18.641.001 12.017.001z"/>
    </svg>
    Log in with Snapchat
  </button>

  <div class="divider"></div>
  <div class="section-title">Step 2 — Share Content with Creative Kit</div>
  <button class="snap-share-btn" onclick="doShare()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738.12.146.174.317.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12.017 24c6.623 0 11.99-5.367 11.99-11.987C24.007 5.367 18.641.001 12.017.001z"/>
    </svg>
    Share to Snapchat Story
  </button>

  <div class="status" id="status">
    <p id="statusText"></p>
  </div>
</div>

<script>
var CLIENT_ID = '4855567b-ff6d-49a9-a65d-1b3b884aea04';
var REDIRECT = 'https://ascensionwharf.com/callback.html';

function show(msg) {
  document.getElementById('status').className = 'status show';
  document.getElementById('statusText').innerHTML = msg;
}

function doLogin() {
  show('Initiating Login Kit...<br>Client ID: ' + CLIENT_ID + '<br>Scope: snapchat-profile-api<br>Redirect: ' + REDIRECT + '<br><br>Redirecting to Snapchat OAuth...');
  var url = 'https://accounts.snapchat.com/accounts/oauth2/auth' +
    '?client_id=' + CLIENT_ID +
    '&redirect_uri=' + encodeURIComponent(REDIRECT) +
    '&response_type=code' +
    '&scope=snapchat-profile-api';
  setTimeout(function(){ window.open(url, '_blank'); }, 1500);
}

function doShare() {
  show('Initiating Creative Kit...<br>Sharing content to Snapchat Story.<br>Attachment URL: https://ascensionwharf.com<br><br>Opening Snapchat share sheet...');
  var url = 'https://www.snapchat.com/scan?attachmentUrl=' + encodeURIComponent('https://ascensionwharf.com');
  setTimeout(function(){ window.open(url, '_blank'); }, 1500);
}
</script>
</body>
</html>
