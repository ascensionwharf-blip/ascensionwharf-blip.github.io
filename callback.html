<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Authorisation Complete - Ascension Wharf</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0C2818;font-family:Georgia,serif;color:#D4AF6A;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
h1{font-size:1.6rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:20px;}
.code-box{background:#0a1f10;border:1px solid #D4AF6A;border-radius:8px;padding:20px 24px;margin:20px auto;max-width:700px;word-break:break-all;font-family:monospace;font-size:0.85rem;color:#fff;text-align:left;position:relative;}
.copy-btn{margin-top:16px;background:#D4AF6A;color:#0C2818;border:none;padding:10px 24px;font-size:0.9rem;font-family:Georgia,serif;cursor:pointer;border-radius:4px;font-weight:bold;}
.copy-btn:hover{background:#c49a50;}
.instructions{opacity:0.7;font-size:0.85rem;margin-top:12px;line-height:1.6;}
.error{color:#ff6b6b;}
.success{color:#6bff9e;margin-top:8px;font-size:0.8rem;display:none;}
</style>
</head>
<body>
<div>
  <h1>Authorisation Complete</h1>
  <div id="content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
const div = document.getElementById('content');

if (error) {
  div.innerHTML = '<p class="error">Error: ' + error + '</p><p class="instructions">Please try again.</p>';
} else if (code) {
  div.innerHTML = `
    <p class="instructions">Copy this code and paste it into your terminal:</p>
    <div class="code-box" id="code">${code}</div>
    <button class="copy-btn" onclick="copyCode()">Copy Code</button>
    <p class="success" id="copied">Copied to clipboard!</p>
    <p class="instructions" style="margin-top:20px;">Paste this into the terminal where the setup script is waiting, then press Enter.</p>
  `;
} else {
  div.innerHTML = '<p class="instructions">You have successfully connected your account to Ascension Wharf.</p>';
}

function copyCode() {
  const code = document.getElementById('code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    document.getElementById('copied').style.display = 'block';
    setTimeout(() => document.getElementById('copied').style.display = 'none', 2000);
  });
}
</script>
</body>
</html>
